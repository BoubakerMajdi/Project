name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    env:
      DOCKER_BUILDKIT: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'                 

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Order Service
        uses: docker/build-push-action@v6
        with:
          context: ./order-service
          file: ./order-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/order-service:latest

      - name: Build and Push Kitchen Service
        uses: docker/build-push-action@v6
        with:
          context: ./kitchen-service
          file: ./kitchen-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kitchen-service:latest

      - name: Build and Push Accounting Service
        uses: docker/build-push-action@v6
        with:
          context: ./accounting-service
          file: ./accounting-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/accounting-service:latest

      - name: Build and Push Order Orchestrator
        uses: docker/build-push-action@v6
        with:
          context: ./order-orchestrator
          file: ./order-orchestrator/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/order-orchestrator:latest