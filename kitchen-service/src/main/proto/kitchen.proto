syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.project.kitchen";
option java_outer_classname = "KitchenProto";

enum TicketStatus
{
    PENDING_APPROVAL = 0;
    ACCEPTED = 1;
    REJECTED = 2;
    CANCELED = 3;
}

message CreateTicketRequest
{
    string ticketId = 1; // To use the order ID from the Order Service when creating a ticket
    string customerId = 2;
}

message CreateTicketResponse
{
    string ticketId = 1;
    string customerId = 2;
    bool success = 3;
}

message AcceptTicketRequest
{
    string ticketId = 1;
}

message AcceptTicketResponse
{
    bool acknowledgement = 1;
}

message RejectTicketRequest
{
    string ticketId = 1;
}

message RejectTicketResponse
{
    bool acknowledgement = 1;
}

message CancelTicketRequest
{
    string ticketId = 1;
}

message CancelTicketResponse
{
    bool acknowledgement = 1;
}

service KitchenService
{
    rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
    rpc AcceptTicket(AcceptTicketRequest) returns (AcceptTicketResponse);
    rpc RejectTicket(RejectTicketRequest) returns (RejectTicketResponse);
    rpc CancelTicket(CancelTicketRequest) returns (CancelTicketResponse);
}