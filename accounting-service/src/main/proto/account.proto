syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.project.account";
option java_outer_classname = "AccountProto";

enum AuthorizationStatus {
  REJECTED = 0;
  ACCEPTED = 1;
}

message AuthorizationRequest {
  string orderId = 1;
  string customerId = 2;
  double amount = 3;
}

message AuthorizationResponse {
  string orderId = 1;
  AuthorizationStatus status = 2;
  bool success = 3;
}

service AccountService {
  rpc AuthorizePayment(AuthorizationRequest) returns (AuthorizationResponse);
}